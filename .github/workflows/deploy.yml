name: Deploy Worker Application

concurrency:
  group: deploy

on:
  push:
    branches:
      - main

defaults:
  run:
    working-directory: ./

jobs:
  deploy-app:
    environment:
      name: production
    runs-on: ubuntu-latest

    steps:
      - name: Runner Common Setup
        uses: mridang/action-runner-common@v1

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Install Dependencies
        run: npm ci

      - name: Build (OpenNext)
        # Workers AI has no local simulation, so OpenNext starts a remote proxy
        # for the AI binding during the build — which needs Cloudflare auth.
        run: npx opennextjs-cloudflare build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: '779037e608ab1102679ef8b1bd499d49'

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: '4.98.0'
          command: d1 migrations apply broadsheet-db --remote

      - name: Deploy to production
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: '4.98.0'
          command: deploy
