name: Run Canary

on:
  workflow_dispatch:
    inputs:
      release_identifier:
        description: 'Release identifier'
        required: true

defaults:
  run:
    working-directory: ./

jobs:
  run-canary:
    runs-on: ubuntu-latest

    steps:
      - name: Runner Common Setup
        uses: mridang/action-runner-common@v1

      - name: Write inputs to file
        run: |
          echo "${{ github.event.inputs.release_identifier }}" > release.txt

      - name: Upload release identifier
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: release.txt

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Install Dependencies
        run: npm ci

      - name: Apply local D1 migrations
        run: npx wrangler d1 migrations apply scenery-db --local

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v7
        with:
          browser: chrome
          start: npx wrangler dev --port 3737 --local
          wait-on: 'http://localhost:3737/'
        env:
          NODE_ENV: 'test'
